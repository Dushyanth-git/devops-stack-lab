# this file is a docker compose file,it should be planted in the ec2 where deployment happens, for setting up loki, promtail and grafana for log aggregation and visualization. It defines three services: loki for log storage, promtail for log collection, and grafana for log visualization. Each service is configured with the necessary image, ports, and dependencies to ensure proper communication between them.
version: '3.8'
services:
    loki:
        image: grafana/loki:2.9.0
        container_name: loki 
        ports: 
            - "3100:3100"
        command: -config.file=/etc/loki/local-config.yaml 
    promtail:
        image: grafana/promtail:2.9.0
        container_name: promtail
        volumes:
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
            - /var/run/docker.sock:/var/run/docker.sock
            - /etc/machine-id:/etc/machine-id
        command: -config.file=/etc/promtail/config.yml
        depends_on: 
            - loki
    grafana: 
        image: grafana/grafana:10.0.0
        container_name: grafana
        ports:
           - "3000:3000"
        depends_on: 
            - loki

